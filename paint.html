<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お絵かきツール</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #fdf5e6; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; margin: 0; padding: 20px; }
        .toolbar { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
        canvas { background: white; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); cursor: crosshair; touch-action: none; max-width: 95vw; }
        button { padding: 10px 15px; border: none; border-radius: 10px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        button:hover { transform: translateY(-2px); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <h1>🎨 お絵かきコーナー</h1>
    <div class="toolbar">
        <input type="color" id="colorPicker">
        <input type="range" id="lineWidth" min="1" max="20" value="5">
        <button onclick="setMode('pen')"><i class="fas fa-pen"></i> ペン</button>
        <button onclick="setMode('fill')"><i class="fas fa-fill-drip"></i> 塗りつぶし</button>
        <button onclick="setMode('erase')"><i class="fas fa-eraser"></i> 消しゴム</button>
        <button class="btn-save" onclick="saveImage()"><i class="fas fa-download"></i> 保存</button>
        <button class="btn-clear" onclick="clearCanvas()"><i class="fas fa-trash"></i> 全部消す</button>
        <button onclick="location.href='index.html'">戻る</button>
    </div>

    <canvas id="paintCanvas" width="500" height="500"></canvas>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const colorPicker = document.getElementById('colorPicker');
        const lineWidth = document.getElementById('lineWidth');
        
        let painting = false;
        let mode = 'pen';

        function setMode(m) { mode = m; }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            return { x: Math.floor(clientX - rect.left), y: Math.floor(clientY - rect.top) };
        }

        canvas.addEventListener('mousedown', (e) => {
            if (mode === 'fill') {
                const pos = getMousePos(e);
                floodFill(pos.x, pos.y, hexToRgba(colorPicker.value));
            } else {
                painting = true;
                draw(e);
            }
        });

        canvas.addEventListener('mouseup', () => { painting = false; ctx.beginPath(); });
        canvas.addEventListener('mousemove', (e) => { if (painting) draw(e); });

        function draw(e) {
            if (mode === 'fill') return;
            ctx.lineWidth = lineWidth.value;
            ctx.lineCap = 'round';
            ctx.strokeStyle = (mode === 'erase') ? '#ffffff' : colorPicker.value;
            const pos = getMousePos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        // 塗りつぶしアルゴリズム (Flood Fill)
        function floodFill(startX, startY, fillColor) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const targetColor = getPixel(imageData, startX, startY);
            if (colorsMatch(targetColor, fillColor)) return;

            const pixelStack = [[startX, startY]];
            while (pixelStack.length) {
                const [x, y] = pixelStack.pop();
                if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) continue;
                if (colorsMatch(getPixel(imageData, x, y), targetColor)) {
                    setPixel(imageData, x, y, fillColor);
                    pixelStack.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        function getPixel(data, x, y) {
            const i = (y * data.width + x) * 4;
            return [data.data[i], data.data[i+1], data.data[i+2], data.data[i+3]];
        }
        function setPixel(data, x, y, color) {
            const i = (y * data.width + x) * 4;
            data.data[i] = color[0]; data.data[i+1] = color[1]; data.data[i+2] = color[2]; data.data[i+3] = color[3];
        }
        function colorsMatch(a, b) { return a[0] === b[0] && a[1] === b[1] && a[2] === b[2] && a[3] === b[3]; }
        function hexToRgba(hex) {
            const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
            return [r, g, b, 255];
        }

        function clearCanvas() { ctx.fillStyle = "white"; ctx.fillRect(0, 0, canvas.width, canvas.height); }
        function saveImage() {
            const link = document.createElement('a');
            link.download = 'my-art.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
