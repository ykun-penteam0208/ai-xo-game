<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>おしゃれお絵かきツール</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: #fdf5e6; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px; 
        }
        
        /* ツールバーをオシャレなカード風に */
        .toolbar { 
            background: white; 
            padding: 20px; 
            border-radius: 25px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
            margin-bottom: 25px; 
            display: flex; 
            gap: 15px; 
            align-items: center; 
            flex-wrap: wrap; 
            justify-content: center; 
        }

        /* ツールごとの色分け */
        .group-pen { border-left: 5px solid #ff9f43; padding-left: 10px; }
        .group-tool { border-left: 5px solid #54a0ff; padding-left: 10px; }
        .group-action { border-left: 5px solid #1dd1a1; padding-left: 10px; }

        canvas { 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            cursor: crosshair; 
            touch-action: none; 
            max-width: 95vw; 
        }
        
        button { 
            padding: 10px 18px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.3s; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        button:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 5px 10px rgba(0,0,0,0.15); 
        }
        
        input[type="color"] { width: 40px; height: 40px; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h1>🎨 お絵かきコーナー</h1>
    
    <div class="toolbar">
        <!-- ペン系グループ -->
        <div class="group-pen">
            <input type="color" id="colorPicker">
            <input type="range" id="lineWidth" min="1" max="30" value="5" title="太さ">
        </div>

        <!-- ツール系グループ -->
        <div class="group-tool">
            <button onclick="setMode('pen')" style="background:#ff9f43; color:white;"><i class="fas fa-pen"></i> ペン</button>
            <button onclick="setMode('fill')" style="background:#5f27cd; color:white;"><i class="fas fa-fill-drip"></i> 塗りつぶし</button>
            <button onclick="setMode('erase')" style="background:#c8d6e5; color:#222;"><i class="fas fa-eraser"></i> 消しゴム</button>
        </div>

        <!-- アクション系グループ -->
        <div class="group-action">
            <button onclick="saveImage()" style="background:#10ac84; color:white;"><i class="fas fa-download"></i> 保存</button>
            <button onclick="clearCanvas()" style="background:#ee5253; color:white;"><i class="fas fa-trash"></i> クリア</button>
            <button onclick="location.href='index.html'" style="background:#576574; color:white;"><i class="fas fa-arrow-left"></i> 戻る</button>
        </div>
    </div>

    <canvas id="paintCanvas" width="500" height="500"></canvas>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const colorPicker = document.getElementById('colorPicker');
        const lineWidth = document.getElementById('lineWidth');
        
        let painting = false;
        let mode = 'pen';

        // 初期状態で白く塗りつぶしておく
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        function setMode(m) { mode = m; }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            return { x: Math.floor(clientX - rect.left), y: Math.floor(clientY - rect.top) };
        }

        canvas.addEventListener('mousedown', (e) => {
            if (mode === 'fill') {
                const pos = getMousePos(e);
                floodFill(pos.x, pos.y, hexToRgba(colorPicker.value));
            } else {
                painting = true;
                draw(e);
            }
        });

        canvas.addEventListener('mouseup', () => { 
            painting = false; 
            ctx.beginPath(); 
        });

        canvas.addEventListener('mousemove', (e) => { 
            if (painting) draw(e); 
        });

        function draw(e) {
            if (mode === 'fill') return;
            ctx.lineWidth = lineWidth.value;
            ctx.lineCap = 'round';
            ctx.strokeStyle = (mode === 'erase') ? '#ffffff' : colorPicker.value;
            const pos = getMousePos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        // 塗りつぶしアルゴリズム (Flood Fill)
        function floodFill(startX, startY, fillColor) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const targetColor = getPixel(imageData, startX, startY);
            if (colorsMatch(targetColor, fillColor)) return;

            const pixelStack = [[startX, startY]];
            while (pixelStack.length) {
                const [x, y] = pixelStack.pop();
                if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) continue;
                if (colorsMatch(getPixel(imageData, x, y), targetColor)) {
                    setPixel(imageData, x, y, fillColor);
                    pixelStack.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        function getPixel(data, x, y) {
            const i = (y * data.width + x) * 4;
            return [data.data[i], data.data[i+1], data.data[i+2], data.data[i+3]];
        }

        function setPixel(data, x, y, color) {
            const i = (y * data.width + x) * 4;
            data.data[i] = color[0]; 
            data.data[i+1] = color[1]; 
            data.data[i+2] = color[2]; 
            data.data[i+3] = color[3];
        }

        function colorsMatch(a, b) { 
            return a[0] === b[0] && a[1] === b[1] && a[2] === b[2] && a[3] === b[3]; 
        }

        function hexToRgba(hex) {
            const r = parseInt(hex.slice(1,3), 16);
            const g = parseInt(hex.slice(3,5), 16);
            const b = parseInt(hex.slice(5,7), 16);
            return [r, g, b, 255];
        }

        function clearCanvas() { 
            ctx.fillStyle = "white"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height); 
        }

        function saveImage() {
            const link = document.createElement('a');
            link.download = 'my-art.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        // タッチ操作への対応
        canvas.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent("mousedown", { clientX: touch.clientX, clientY: touch.clientY });
            canvas.dispatchEvent(mouseEvent);
        });

        canvas.addEventListener('touchmove', (e) => { 
            e.preventDefault(); 
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent("mousemove", { clientX: touch.clientX, clientY: touch.clientY });
            canvas.dispatchEvent(mouseEvent);
        });

        canvas.addEventListener('touchend', (e) => { 
            const mouseEvent = new MouseEvent("mouseup", {});
            canvas.dispatchEvent(mouseEvent);
        });
    </script>
</body>
</html>
