<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>優しめのAIと〇×ゲーム</title>
    <!-- ファビコンの設定 -->
<link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { text-align: center; font-family: sans-serif; background: #fdf5e6; margin: 0; padding: 10px; }
        
        /* スマホ対応：ボードを画面幅に合わせて伸縮させる */
        .board { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 5px; 
            justify-content: center; 
            margin: 20px auto; 
            max-width: 320px; 
            width: 100%; 
        }
        .cell { 
            aspect-ratio: 1 / 1; 
            border: 2px solid #333; 
            font-size: 2rem; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            background: white; 
        }
        
        #status { font-size: 1.2rem; margin: 10px; font-weight: bold; }
        .controls { margin-top: 20px; }
        button { padding: 10px 20px; font-size: 1rem; cursor: pointer; margin: 5px; }
        
        #share-area { margin-top: 20px; display: none; }
        .x-button { background: #1da1f2; color: white; border: none; padding: 15px 25px; border-radius: 50px; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>

    <h1>VS 優しめのAI 〇×ゲーム</h1>
    <p>あなたのスコア: <span id="score">0</span></p>
    <div id="status">あんたの番や！</div>
    <div class="board" id="board"></div>
    
    <div class="controls">
        <button onclick="resetGame()">やり直し</button>
        <button onclick="toggleShare()">SNSに公開する</button>
        <div id="share-area">
            <button class="x-button" onclick="postToX()">
                <i class="fab fa-twitter"></i> Xでスコアを投稿！
            </button>
        </div>
    </div>

    <script>
        let board = Array(9).fill(null);
        let gameActive = true;
        let score = 0;

        function toggleShare() {
            const area = document.getElementById('share-area');
            area.style.display = (area.style.display === 'block') ? 'none' : 'block';
        }

        function postToX() {
            const text = `優しめのAIとの〇×ゲームでスコア「${score}」出したで！楽しかったわー！ https://ykun-penteam0208.github.io/ai-xo-game/ `;
            const shareUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
            window.open(shareUrl, '_blank', 'width=600,height=400');
        }

        function render() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            board.forEach((val, i) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = val || '';
                cell.onclick = () => playerMove(i);
                boardEl.appendChild(cell);
            });
        }

        function playerMove(i) {
            if (!gameActive || board[i]) return;
            board[i] = '〇';
            render();
            if (checkWinner('〇')) endGame('あんたの勝ちや！おめでとう！', 10);
            else if (!board.includes(null)) endGame('引き分けや！', 0);
            else aiMove();
        }

        function aiMove() {
            gameActive = false;
            setTimeout(() => {
                // AIを弱くするために、ランダムな動きを混ぜるで！
                let move = -1;
                const available = board.map((v, i) => v === null ? i : null).filter(v => v !== null);

                // 50%の確率で適当な場所に置く（弱体化）
                if (Math.random() < 0.5) {
                    move = available[Math.floor(Math.random() * available.length)];
                } else {
                    // それ以外はMinimaxで考えるけど、相手に勝たせてあげることもあるかも？
                    let bestScore = -Infinity;
                    for (let i of available) {
                        board[i] = '×';
                        let s = minimax(board, 0, false);
                        board[i] = null;
                        if (s > bestScore) { bestScore = s; move = i; }
                    }
                }

                if (move !== -1) board[move] = '×';
                render();
                if (checkWinner('×')) endGame('AIの勝ちや！また次頑張ろ！', -10);
                else if (!board.includes(null)) endGame('引き分けや！', 0);
                else gameActive = true;
            }, 500);
        }

        function endGame(msg, points) {
            gameActive = false;
            document.getElementById('status').innerText = msg;
            score += points;
            document.getElementById('score').innerText = score;
        }

        function resetGame() {
            board = Array(9).fill(null);
            gameActive = true;
            document.getElementById('status').innerText = "あんたの番や！";
            render();
        }

        function minimax(b, depth, isMaximizing) {
            if (checkWinner('×')) return 10 - depth;
            if (checkWinner('〇')) return depth - 10;
            if (!b.includes(null)) return 0;
            
            let best = isMaximizing ? -Infinity : Infinity;
            for (let i = 0; i < 9; i++) {
                if (!b[i]) {
                    b[i] = isMaximizing ? '×' : '〇';
                    let val = minimax(b, depth + 1, !isMaximizing);
                    b[i] = null;
                    best = isMaximizing ? Math.max(best, val) : Math.min(best, val);
                }
            }
            return best;
        }

        function checkWinner(p) {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return lines.some(line => line.every(i => board[i] === p));
        }

        render();
    </script>
</body>
</html>
