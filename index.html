<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VS 優しめのAI 〇×ゲーム</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            text-align: center; font-family: 'Segoe UI', sans-serif; 
            background: #fdf5e6; margin: 0; padding: 20px; 
            display: flex; flex-direction: column; align-items: center; 
        }
        h1 { color: #333; }
        .score-board { font-size: 1.2rem; margin-bottom: 10px; font-weight: bold; }
        
        .board { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 10px; max-width: 300px; width: 90%; margin: 20px auto; 
        }
        .cell { 
            aspect-ratio: 1 / 1; background: white; border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; 
            align-items: center; justify-content: center; font-size: 2.5rem; 
            cursor: pointer; transition: transform 0.2s, background 0.3s; 
        }
        .cell:hover { transform: scale(1.05); background: #fffdf9; }
        
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .pop-animation { animation: pop 0.3s ease-out; }

        #status { font-size: 1.5rem; margin: 10px; font-weight: bold; color: #444; }
        
        .controls { margin-top: 20px; }
        button { padding: 10px 20px; font-size: 1rem; cursor: pointer; margin: 5px; border-radius: 20px; border: none; transition: 0.3s; }
        
        .share-btn {
            padding: 12px 20px; margin: 5px; border-radius: 50px;
            color: white; font-weight: bold; cursor: pointer;
            transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 8px;
        }
        .share-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <h1>VS 優しめのAI 〇×ゲーム</h1>
    <div class="score-board">スコア: <span id="score">0</span></div>
    <div id="status">あんたの番や！</div>
    <div class="board" id="board"></div>
    
    <div class="controls">
        <button onclick="resetGame()">やり直し</button>
        <button onclick="location.href='paint.html'" style="background: #333; color: white;">
            <i class="fas fa-palette"></i> お絵かきへ行く
    </button>
        <button onclick="toggleShare()">SNSにシェア</button>
        <div id="share-area" style="display:none; margin-top: 20px;">
            <p>結果をシェアするで！</p>
            <button class="share-btn" style="background:#1da1f2;" onclick="shareToSNS('twitter')"><i class="fab fa-twitter"></i> X</button>
            <button class="share-btn" style="background:#e1306c;" onclick="shareToSNS('instagram')"><i class="fab fa-instagram"></i> Insta</button>
            <button class="share-btn" style="background:#ff0000;" onclick="shareToSNS('youtube')"><i class="fab fa-youtube"></i> YouTube</button>
        </div>
    </div>

    <script>
        let board = Array(9).fill(null);
        let gameActive = true;
        let score = 0;

        function render() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            board.forEach((val, i) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (val) {
                    cell.innerText = val;
                    cell.classList.add('pop-animation');
                }
                cell.onclick = () => playerMove(i);
                boardEl.appendChild(cell);
            });
        }

        function playerMove(i) {
            if (!gameActive || board[i]) return;
            board[i] = '〇';
            render();
            if (checkWinner('〇')) endGame('あんたの勝ちや！', 10);
            else if (!board.includes(null)) endGame('引き分けや！', 0);
            else aiMove();
        }

        async function aiMove() {
            gameActive = false;
            document.getElementById('status').innerText = "AIが考え中...";
            await new Promise(r => setTimeout(r, 800));

            let move = -1;
            const available = board.map((v, i) => v === null ? i : null).filter(v => v !== null);
            
            if (Math.random() < 0.3) {
                move = available[Math.floor(Math.random() * available.length)];
            } else {
                let best = -Infinity;
                for (let i of available) {
                    board[i] = '×';
                    let s = minimax(board, 0, false);
                    board[i] = null;
                    if (s > best) { best = s; move = i; }
                }
            }

            if (move !== -1) board[move] = '×';
            render();
            if (checkWinner('×')) endGame('AIの勝ちや！', -10);
            else if (!board.includes(null)) endGame('引き分けや！', 0);
            else { gameActive = true; document.getElementById('status').innerText = "あんたの番や！"; }
        }

        function minimax(b, depth, isMax) {
            if (checkWinner('×')) return 10 - depth;
            if (checkWinner('〇')) return depth - 10;
            if (!b.includes(null)) return 0;
            let best = isMax ? -Infinity : Infinity;
            for (let i = 0; i < 9; i++) {
                if (!b[i]) {
                    b[i] = isMax ? '×' : '〇';
                    let val = minimax(b, depth + 1, !isMax);
                    b[i] = null;
                    best = isMax ? Math.max(best, val) : Math.min(best, val);
                }
            }
            return best;
        }

        function checkWinner(p) {
            const l = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return l.some(line => line.every(i => board[i] === p));
        }

        function endGame(msg, pts) {
            gameActive = false;
            document.getElementById('status').innerText = msg;
            score += pts;
            document.getElementById('score').innerText = score;
        }

        function resetGame() {
            board = Array(9).fill(null);
            gameActive = true;
            document.getElementById('status').innerText = "あんたの番や！";
            render();
        }

        function toggleShare() {
            const area = document.getElementById('share-area');
            area.style.display = (area.style.display === 'none') ? 'block' : 'none';
        }

        async function shareToSNS(platform) {
            const text = `最強AIとの〇×ゲームでスコア「${score}」出したで！楽しかったわー！\nhttps://ykun-penteam0208.github.io/ai-xo-game/\n#〇×ゲーム #AI対戦`;
            await navigator.clipboard.writeText(text);
            alert("結果をコピーしたで！貼り付けてな！");
            const urls = {
                twitter: `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`,
                instagram: "https://www.instagram.com/",
                youtube: "https://www.youtube.com/"
            };
            window.open(urls[platform], '_blank');
        }

        render();
    </script>
</body>
</html>
